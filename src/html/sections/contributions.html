<!-- CONTRIBUIÇÕES GITHUB -->
<section class="section__contributions scroll-section" id="contributions">
    <div class="title fade-in">
        <h2>Atividade no GitHub</h2>
        <div class="line"></div>
    </div>

    <div class="contribution-graph fade-in card-glass">
        <div class="contribution-graph__title">
            <h4>Atividade de contribuições</h4>
            <div class="contribution-graph__stats">
                <div class="contribution-graph__stat">
                    <span class="contribution-graph__stat-number" id="totalContributions">156</span>
                    <span class="contribution-graph__stat-label">contribuições no último ano</span>
                </div>
            </div>
        </div>
        <div class="contribution-graph__grid" id="contributionGrid"></div>
        <div class="contribution-graph__legend">
            <span>Menos</span>
            <div class="contribution-graph__legend-scale">
                <span style="background: var(--border-color)"></span>
                <span style="background: rgba(99, 102, 241, 0.3)"></span>
                <span style="background: rgba(99, 102, 241, 0.5)"></span>
                <span style="background: rgba(99, 102, 241, 0.7)"></span>
                <span style="background: var(--accent-color)"></span>
            </div>
            <span>Mais</span>
        </div>
    </div>
</section>
