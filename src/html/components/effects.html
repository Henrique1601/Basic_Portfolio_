<!-- Morphing Shapes -->
<div class="morphing-shapes">
    <svg class="morph-shape morph-shape-1" viewBox="0 0 200 200">
        <defs>
            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:var(--accent-color);stop-opacity:1" />
                <stop offset="100%" style="stop-color:var(--accent-secondary);stop-opacity:1" />
            </linearGradient>
        </defs>
        <rect width="200" height="200" fill="url(#grad1)" />
    </svg>
    <svg class="morph-shape morph-shape-2" viewBox="0 0 200 200">
        <defs>
            <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:var(--accent-secondary);stop-opacity:1" />
                <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
            </linearGradient>
        </defs>
        <circle cx="100" cy="100" r="80" fill="url(#grad2)" />
    </svg>
    <svg class="morph-shape morph-shape-3" viewBox="0 0 200 200">
        <defs>
            <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
                <stop offset="100%" style="stop-color:var(--accent-color);stop-opacity:1" />
            </linearGradient>
        </defs>
        <polygon points="100,10 190,190 10,190" fill="url(#grad3)" />
    </svg>
</div>

<!-- Confetti Container -->
<div class="confetti-container" id="confettiContainer"></div>

<!-- Progress Bar -->
<div class="progress-bar" id="progressBar"></div>

<!-- Lightbox para Galeria -->
<div class="lightbox" id="lightbox">
    <div class="lightbox__content">
        <button class="lightbox__close">&times;</button>
        <button class="lightbox__nav lightbox__prev">❮</button>
        <img class="lightbox__image" id="lightboxImage" src="" alt="">
        <button class="lightbox__nav lightbox__next">❯</button>
    </div>
</div>

<!-- Pop-up Newsletter -->
<div class="popup" id="newsletterPopup">
    <div class="popup__content">
        <button class="popup__close" id="popupClose">&times;</button>
        <div class="popup__icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
            </svg>
        </div>
        <h3 class="popup__title">Bem-vindo!</h3>
        <p class="popup__text">Receba novidades e projetos exclusivos diretamente no seu email.</p>
        <form class="popup__form" id="newsletterForm">
            <input type="email" class="popup__input" placeholder="seu@email.com" required>
            <button type="submit" class="popup__submit">Inscrever-se</button>
        </form>
        <p class="popup__note">Sem spam. Você pode cancelar a qualquer momento.</p>
    </div>
</div>

<!-- Preloader -->
<div id="preloader" class="preloader">
    <div class="preloader__content">
        <div class="preloader__spinner"></div>
        <p>Carregando...</p>
    </div>
</div>
